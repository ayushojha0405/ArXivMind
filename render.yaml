services:
  - type: web
    name: arxivmind-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 1 --timeout 120 --preload --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: /var/data/chroma
    disk:
      name: chroma-data
      mountPath: /var/data/chroma
      sizeGB: 1
    rootDir: backend
